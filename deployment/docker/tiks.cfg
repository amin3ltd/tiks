[pretix]
instance_name=tiks
url=http://localhost:8080
datadir=/data
registration=true
plugins_default=pretix.plugins.sendmail,pretix.plugins.statistics,pretix.plugins.checkinlists
currency=ETB

[locale]
default=en
timezone=Africa/Addis_Ababa

[database]
backend=postgresql
name=tiks
user=tiks
password=tiks
host=db
port=5432

[redis]
location=redis://redis:6379/0
sessions=true

[celery]
broker=redis://redis:6379/1
backend=redis://redis:6379/2

[mail]
from=tiks@localhost
host=localhost
port=25

[django]
debug=false
